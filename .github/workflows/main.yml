name: Build Debug APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: artifacts/android-assistant

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.7

      - name: Build APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tail -150

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: artifacts/android-assistant/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
