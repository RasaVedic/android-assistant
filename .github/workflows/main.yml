name: Build Debug APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: artifacts/android-assistant

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      # Restore the consistent signing keystore (so updates work without uninstalling)
      - name: Restore Signing Keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > pkassist.jks
          echo "Keystore restored for consistent signing"

      - name: Build APK (signed with consistent key)
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          bash gradlew assembleDebug --no-daemon \
            -Pandroid.injected.signing.store.file=$(pwd)/pkassist.jks \
            -Pandroid.injected.signing.store.password=pkassist123 \
            -Pandroid.injected.signing.key.alias=pkassist \
            -Pandroid.injected.signing.key.password=pkassist123

      - name: Build APK (random signing key — updates need uninstall)
        if: ${{ secrets.KEYSTORE_BASE64 == '' }}
        run: |
          echo "⚠️  KEYSTORE_BASE64 secret not set — APK signed with random key"
          echo "    Run the 'Generate Keystore' workflow once to fix this."
          bash gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PKassist-debug
          path: artifacts/android-assistant/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30
