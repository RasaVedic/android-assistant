name: Build & Publish Latest APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: artifacts/android-assistant

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      # ── Build APK (signed if keystore secret is set) ───────────────────────
      - name: Build APK
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > pkassist.jks
            echo "Keystore restored for consistent signing"
            bash gradlew assembleDebug --no-daemon \
              -Pandroid.injected.signing.store.file=$(pwd)/pkassist.jks \
              -Pandroid.injected.signing.store.password=pkassist123 \
              -Pandroid.injected.signing.key.alias=pkassist \
              -Pandroid.injected.signing.key.password=pkassist123
          else
            echo "KEYSTORE_BASE64 secret not set — APK signed with random key"
            bash gradlew assembleDebug --no-daemon
          fi

      # ── Rename APK ─────────────────────────────────────────────────────────
      - name: Rename APK
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk PKassist-latest.apk

      # ── Upload as workflow artifact (30-day backup) ────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: PKassist-latest
          path: artifacts/android-assistant/PKassist-latest.apk
          if-no-files-found: error
          retention-days: 30

      # ── Move the 'latest' tag to this commit ──────────────────────────────
      - name: Update latest tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f latest
          git push origin latest --force
        working-directory: ${{ github.workspace }}

      # ── Publish / update the GitHub Release ───────────────────────────────
      - name: Publish Latest Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "PKassist — Latest Build"
          body: |
            ## Latest Build

            This release is updated automatically on every push to master.

            **Commit:** `${{ github.sha }}`
            **Branch:** `${{ github.ref_name }}`

            ### How to install
            1. Download **PKassist-latest.apk** below
            2. Transfer to your Android phone
            3. Enable "Install from unknown sources" in Settings if asked
            4. Tap the APK to install
          files: artifacts/android-assistant/PKassist-latest.apk
          prerelease: true
          make_latest: true
