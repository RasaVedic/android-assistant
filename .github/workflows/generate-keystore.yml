name: Generate Keystore (Run Once)

# Run this ONCE to generate a permanent signing key.
# After running:
# 1. Go to Actions → this run → Artifacts → download "keystore-setup"
# 2. Open keystore-info.txt
# 3. Copy the base64 content
# 4. Go to GitHub repo → Settings → Secrets → Actions → New secret
#    Name: KEYSTORE_BASE64   Value: (paste the base64 content)
# 5. Done — all future builds will use this same key (updates will work!)

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Release Keystore
        run: |
          keytool -genkeypair \
            -alias pkassist \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -keystore pkassist.jks \
            -storepass pkassist123 \
            -keypass pkassist123 \
            -dname "CN=PKassist, OU=App, O=RasaVedic, L=India, ST=India, C=IN" \
            -noprompt

          echo "Keystore generated successfully!"

          # Base64 encode for use as GitHub Secret
          base64 pkassist.jks > pkassist-base64.txt

          # Create setup instructions
          cat > keystore-info.txt << 'EOF'
          === PKassist Keystore Setup ===

          KEYSTORE_ALIAS:    pkassist
          KEYSTORE_PASSWORD: pkassist123
          KEY_PASSWORD:      pkassist123

          Steps to set up (do this once):
          1. Copy the contents of pkassist-base64.txt
          2. GitHub repo → Settings → Secrets and variables → Actions
          3. Click "New repository secret"
          4. Name: KEYSTORE_BASE64
          5. Value: paste the base64 content
          6. Save

          After this, all builds will use this same key.
          Users can update the app without uninstalling!
          EOF

          echo "=== SETUP COMPLETE ==="

      - name: Upload Keystore Files
        uses: actions/upload-artifact@v4
        with:
          name: keystore-setup
          path: |
            pkassist.jks
            pkassist-base64.txt
            keystore-info.txt
          retention-days: 1
