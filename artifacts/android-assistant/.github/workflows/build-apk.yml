# .github/workflows/build-apk.yml
#
# GitHub Actions workflow that automatically builds the debug APK
# every time you push to the main branch.
#
# HOW TO USE:
# 1. Push this project to GitHub
# 2. GitHub will automatically run this workflow
# 3. When it finishes, click "Actions" tab → select the latest run → scroll down to "Artifacts"
# 4. Download "debug-apk" and install it on your phone

name: Build Debug APK

# When to run: on every push to the main branch, or when you trigger it manually
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:   # allows manual trigger from the Actions tab

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest   # free GitHub-hosted Linux runner

    steps:
      # Step 1: Check out the code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Java 17 (required for the Android Gradle Plugin 8.x)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'   # Eclipse Temurin is a reliable free JDK
          cache: gradle             # cache Gradle to speed up future builds

      # Step 3: Make the Gradle wrapper script executable (Linux needs this)
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Step 4: Build the debug APK
      # 'assembleDebug' creates app/build/outputs/apk/debug/app-debug.apk
      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon
        env:
          # Prevent Gradle from trying to open a GUI
          TERM: dumb

      # Step 5: Upload the APK so you can download it from the Actions tab
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30   # keep the file for 30 days

      # Step 6 (optional): Print the APK file size for reference
      - name: Show APK info
        run: |
          echo "=== APK built successfully ==="
          ls -lh app/build/outputs/apk/debug/app-debug.apk
