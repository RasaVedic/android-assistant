# .github/workflows/build-apk.yml
#
# Aria AI — Automated Build & Release Workflow
#
# WHAT IT DOES:
# 1. On every push to main/master  → builds a Debug APK (for testing)
# 2. When you push a version tag   → builds a Release APK + creates GitHub Release
#    with the APK attached and sends notifications to watchers.
#
# HOW TO TRIGGER A RELEASE:
#   git tag v1.7
#   git push origin v1.7
#   → GitHub will build the APK and create a release automatically.
#
# REQUIRED SECRETS (set in GitHub repo → Settings → Secrets):
#   GEMINI_API_KEY    — bakes Gemini key into the APK
#   FIREBASE_API_KEY  — bakes Firebase key into the APK

name: Build & Release Aria

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*.*'          # trigger release on version tags: v1.7, v1.8, etc.
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:    # manual trigger from Actions tab

jobs:

  # ── Debug build (every push to main) ───────────────────────────────────────
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    if: "!startsWith(github.ref, 'refs/tags/')"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        working-directory: artifacts/android-assistant
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: artifacts/android-assistant
        run: ./gradlew assembleDebug --no-daemon
        env:
          TERM: dumb
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Aria-debug-apk
          path: artifacts/android-assistant/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Show APK info
        working-directory: artifacts/android-assistant
        run: |
          echo "=== Debug APK built successfully ==="
          ls -lh app/build/outputs/apk/debug/app-debug.apk

  # ── Release build (on version tag push) ────────────────────────────────────
  release:
    name: Build & Publish Release APK
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        working-directory: artifacts/android-assistant
        run: chmod +x gradlew

      - name: Build release APK
        working-directory: artifacts/android-assistant
        run: ./gradlew assembleRelease --no-daemon
        env:
          TERM: dumb
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}

      - name: Rename APK
        run: |
          mkdir -p release-output
          cp artifacts/android-assistant/app/build/outputs/apk/release/app-release-unsigned.apk \
             release-output/Aria-${{ steps.version.outputs.VERSION }}.apk

      - name: Read release notes from version.json
        id: notes
        run: |
          NOTES=$(python3 -c "import json; d=json.load(open('artifacts/android-assistant/version.json')); print(d.get('releaseNotes',''))")
          echo "NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Update version.json downloadUrl
        run: |
          python3 -c "
          import json
          with open('artifacts/android-assistant/version.json', 'r') as f:
              d = json.load(f)
          tag = '${{ steps.version.outputs.VERSION }}'
          d['downloadUrl'] = f'https://github.com/${{ github.repository }}/releases/download/{tag}/Aria-{tag}.apk'
          with open('artifacts/android-assistant/version.json', 'w') as f:
              json.dump(d, f, indent=2)
          "

      - name: Commit updated version.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add artifacts/android-assistant/version.json
          git diff --cached --quiet || git commit -m "chore: update downloadUrl for ${{ steps.version.outputs.VERSION }}"
          git push origin HEAD:main || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: "Aria AI ${{ steps.version.outputs.VERSION }}"
          body: |
            ## Aria AI ${{ steps.version.outputs.VERSION }}

            ### What's new
            ${{ steps.notes.outputs.NOTES }}

            ---

            ### How to install
            1. Download **Aria-${{ steps.version.outputs.VERSION }}.apk** below
            2. Open the downloaded file on your Android phone
            3. Tap **Install** (allow "Unknown sources" if asked)
            4. Open **Aria** and enjoy!
          files: release-output/Aria-${{ steps.version.outputs.VERSION }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Show release info
        run: |
          echo "=== Release APK ==="
          ls -lh release-output/
